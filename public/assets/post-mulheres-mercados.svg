<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Mulheres que movem mercados</title>
  <desc id="desc">Capa editorial WD9 para publicacao sobre lideranca feminina.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset=".55" stop-color="#111111"/>
      <stop offset="1" stop-color="#fa6604"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="935" cy="340" r="190" fill="#ffffff" fill-opacity=".1"/>
  <circle cx="985" cy="280" r="130" fill="#ffffff" fill-opacity=".12"/>
  <text x="80" y="105" fill="#fa6604" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">PUBLICACAO</text>
  <text x="80" y="270" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="800">Mulheres que</text>
